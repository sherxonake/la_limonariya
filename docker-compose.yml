name: limonariya

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: limon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-limon_dev}
      POSTGRES_DB: limonariya
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U limon -d limonariya"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://limon:${POSTGRES_PASSWORD:-limon_dev}@postgres:5432/limonariya
      PORT: 3000
      PIN_PEPPER: ${PIN_PEPPER:-dev-pepper-change-me}
      BOOTSTRAP_DIRECTOR_PIN: ${BOOTSTRAP_DIRECTOR_PIN:-1234}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - api

volumes:
  pgdata:
